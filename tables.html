<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tables</title>
</head>

<body>
    <table>
        <caption>Budget</caption>
        <thead>
            <tr>
                <th scope="col">Category</th>
                <th scope="col">Budget</th>
                <th scope="col">Spending</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th scope="row">Food</th>
                <td>1000</td>
                <td>1400</td>
            </tr>

            <tr>
                <th scope="row">Entertainment</th>
                <td>2000</td>
                <td>800</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>Total</th>
                <td>3000</td>
                <td>2200</td>
            </tr>
        </tfoot>

    </table>
</body>

</html>
