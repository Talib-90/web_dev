<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms</title>
</head>

<body>
    <form action="">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" placeholder="User123" required />

        <label for="username">Password</label>
        <input id="password" type="password" name="password" required />

        <button>Submit</button>

        <input type="checkbox" name="checkbox" id="checkbox">

        <fieldset>
            <legend>Choose your animal</legend>
            <label for="cat">cat</label>
            <input id="cat" type="radio" name="Animal" value="cat">

            <label for="dog">dog</label>
            <input id="dog" type="radio" name="Animal" value="dog">

            <label for="rat">rat</label>
            <input id="rat" type="radio" name="Animal" value="rat">
        </fieldset>

    </form>

</body>

</html>
